<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f2ec" />
    <title>共用记账</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="kicker">Shared Ledger</p>
          <h1>共用记账</h1>
        </div>
        <button class="icon-button" id="syncNow" type="button" aria-label="同步">
          <span>↻</span>
        </button>
      </header>

      <section class="summary-panel" aria-label="月度概览">
        <div>
          <span class="label">本月支出</span>
          <strong id="monthTotal">¥0.00</strong>
        </div>
        <div>
          <span class="label">本月预算</span>
          <strong id="monthBudget">¥0.00</strong>
        </div>
        <div>
          <span class="label">预算剩余</span>
          <strong id="budgetLeft">¥0.00</strong>
        </div>
      </section>

      <section class="status-line" id="syncStatus">本地模式</section>

      <section class="view active" id="view-add" data-view="add">
        <form class="entry-form" id="expenseForm">
          <label>
            <span>金额</span>
            <input id="amount" name="amount" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="0.00" required />
          </label>

          <label>
            <span>分类</span>
            <select id="category" name="category" required></select>
          </label>

          <label>
            <span>支付人</span>
            <select id="payer" name="payer" required>
              <option value="小王">小王</option>
              <option value="小陈">小陈</option>
            </select>
          </label>

          <label>
            <span>日期</span>
            <input id="date" name="date" type="date" required />
          </label>

          <label>
            <span>备注</span>
            <input id="note" name="note" type="text" maxlength="80" placeholder="早餐、打车、采购..." />
          </label>

          <button class="primary-button" type="submit">记一笔</button>
        </form>
      </section>

      <section class="view" id="view-list" data-view="list">
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="搜索分类、备注、支付人" />
          <select id="monthFilter" aria-label="月份筛选"></select>
        </div>
        <div class="bill-list" id="billList"></div>
      </section>

      <section class="view" id="view-stats" data-view="stats">
        <div class="chart-card">
          <div class="chart-head">
            <div>
              <span class="label">支付人占比</span>
              <strong id="payerStatsMonthLabel">本月</strong>
            </div>
            <span id="payerStatsTotal">¥0.00</span>
          </div>
          <canvas id="payerChart" width="320" height="220"></canvas>
        </div>

        <div class="chart-card">
          <div class="chart-head">
            <div>
              <span class="label">各项支出</span>
              <strong id="categoryStatsMonthLabel">本月 / 上月</strong>
            </div>
          </div>
          <canvas id="categoryBarChart" width="360" height="300"></canvas>
        </div>
        <div class="rank-list" id="rankList"></div>
      </section>

      <section class="view" id="view-settings" data-view="settings">
        <form class="settings-form" id="settingsForm">
          <label>
            <span>我的名字</span>
            <input id="memberName" type="text" maxlength="24" placeholder="例如：小王" />
          </label>
          <label>
            <span>本月预算</span>
            <input id="monthlyBudget" type="number" min="0" step="0.01" inputmode="decimal" placeholder="例如：5000" />
          </label>
          <label>
            <span>共享账本 ID</span>
            <input id="groupId" type="text" maxlength="48" placeholder="例如：home-2026" />
          </label>
          <label>
            <span>Supabase 项目 URL</span>
            <input id="supabaseUrl" type="url" placeholder="https://xxxx.supabase.co" />
          </label>
          <label>
            <span>Supabase anon key</span>
            <textarea id="supabaseKey" rows="3" placeholder="公开 anon key"></textarea>
          </label>
          <button class="primary-button" type="submit">保存设置</button>
        </form>

        <div class="hint">
          <strong>云端同步说明</strong>
          <p>创建 Supabase 表后，把同一组 URL、anon key 和账本 ID 发给共用的人。大家用同一个网页，就会同步到同一本账。</p>
        </div>
      </section>
    </main>

    <nav class="tabbar" aria-label="底部导航">
      <button class="tab active" data-target="add" type="button">记一笔</button>
      <button class="tab" data-target="list" type="button">账单</button>
      <button class="tab" data-target="stats" type="button">统计</button>
      <button class="tab" data-target="settings" type="button">设置</button>
    </nav>

    <template id="emptyTemplate">
      <div class="empty-state">还没有记录</div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
